name: CI/CD Pipeline           # Name shown on GitHub

on:                            # TRIGGER: when does this run?
  push:
    branches: [ main, dev ]    # on every push to main or dev
  pull_request:
    branches: [ main ]         # on every PR targeting main

jobs:                          # A pipeline is made of JOBS
  
  # ─────────────────────────────────────────
  # JOB 1: Test & Lint
  # ─────────────────────────────────────────
  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest     # GitHub spins up a fresh Ubuntu VM

    steps:
      # Step 1: Get your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install your dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Lint — check code style (flake8)
      - name: Lint with flake8
        run: |
          flake8 app.py test_app.py --max-line-length=88 --statistics

      # Step 5: Run your actual tests
      - name: Run tests with pytest
        run: |
          pytest test_app.py -v

  # ─────────────────────────────────────────
  # JOB 2: Build Docker Image
  # (only runs AFTER job 1 passes)
  # ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test               # ← depends on test job passing!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-calculator:${{ github.sha }} .
        # github.sha = unique commit hash, so every build is tagged uniquely

      - name: Smoke test the container
        run: |
          docker run -d -p 5000:5000 --name test-container \
            flask-calculator:${{ github.sha }}
          sleep 3
          curl -f http://localhost:5000/health
          docker stop test-container

  # ─────────────────────────────────────────
  # JOB 3: Deploy to staging
  # (only on main branch, only after build passes)
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'   # ← only deploy from main!

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying commit ${{ github.sha }} to staging..."
          echo "In real life: SSH into server, pull image, restart container"
          # Real example:
          # ssh user@staging-server "docker pull myimage:${{ github.sha }} && docker-compose up -d"